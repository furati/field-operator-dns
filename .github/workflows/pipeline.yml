steps:
- name: Checkout Repository
  uses: actions/checkout@v4

# 1. Erst Docker Buildx einrichten (braucht funktionierendes DNS)
- name: Set up Docker Buildx
  uses: docker/setup-buildx-action@v3

# 2. Dann erst Login
- name: Log in to GitHub Container Registry
  uses: docker/login-action@v3
  with:
    registry: ghcr.io
    username: ${{ github.actor }}
    password: ${{ secrets.GH_TOKEN }}

# 3. Port erst direkt vor dem 'make run' freigeben
- name: Free Port 53 (DNS)
  run: |
    sudo systemctl stop systemd-resolved
    # Wir müssen sicherstellen, dass der Runner noch eine resolv.conf hat
    echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

- name: Build DNS Image
  run: make build

- name: Run DNS Service and Health Check
  run: |
    make run
    sleep 5
    make test
    make stop

# 4. Resolver wieder starten (Optional, aber sauberer für den Push)
- name: Restore DNS Resolver
  if: always()
  run: sudo systemctl start systemd-resolved

- name: Build and Push to GHCR
  env:
    GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  run: make push
