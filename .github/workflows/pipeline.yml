name: Build and Push Nutanix Field DNS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Future-proofing for Node.js 2026 standards
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      DOCKER_API_VERSION: "1.41" # Fix für Docker-in-Docker Inkompatibilität

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Port 53 (DNS)
      # Stoppt den lokalen Resolver, damit der DNS-Container Port 53 binden kann
      run: |
        sudo systemctl stop systemd-resolved
        sudo systemctl disable systemd-resolved

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GH_TOKEN }}

    - name: Verify Config Files
      # Kurzer Check, ob die DNS-Zonen-Dateien korrekt ausgecheckt wurden
      run: |
        ls -la config/
        test -f config/named.conf || exit 1

    - name: Build DNS Image
      run: make build

    - name: Run DNS Service and Health Check
      # Startet den Dienst, wartet auf Bind9 und prüft die Antwort
      run: |
        make run
        sleep 5
        make test
        make stop

    - name: Build and Push to GHCR
      # Startet das Ansible-Playbook (via Toolbox)
      run: make push
