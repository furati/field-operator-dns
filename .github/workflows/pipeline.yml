name: Build and Push Nutanix Field DNS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      DOCKER_API_VERSION: "1.41"

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GH_TOKEN }}

    - name: Free Port 53 for DNS
      run: |
        sudo systemctl stop systemd-resolved
        sudo systemctl disable systemd-resolved
        # Wir löschen den Symlink, damit Docker nicht versucht, 127.0.0.53 zu nutzen
        sudo rm -f /etc/resolv.conf
        echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

    - name: Build DNS Image
      run: make build

    - name: Run DNS Service and Health Check
      run: |
        make run
        sleep 5
        make test
        make stop

    - name: Build and Push to GHCR
      # Wichtig: Hier wird die iac-toolbox (Ansible) getriggert
      run: make push
