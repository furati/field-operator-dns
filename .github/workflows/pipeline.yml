name: Build and Push Nutanix Field DNS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Future-proofing for Node.js 2026 standards
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GH_TOKEN }}

    - name: Build DNS Image
      run: make build

    - name: Setup Mock Config for Testing
      # Wir brauchen eine valide named.conf im Runner, damit 'make run' klappt
      run: |
        mkdir -p config
        cp docker/Dockerfile config/dummy # Nur als Platzhalter, falls Verzeichnis leer
        # Falls du die Files im Repo hast, werden sie durch Checkout geladen.

    - name: Run DNS Service and Health Check
      # Wir starten den DNS, warten kurz und führen den agnostischen Test aus
      run: |
        make run
        sleep 5
        make test
        make stop

    - name: Build and Push to GHCR
      # Nutzt dein Ansible-Playbook via Makefile
      run: make push
