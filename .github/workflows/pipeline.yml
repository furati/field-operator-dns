name: Build and Push Nutanix Field DNS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      DOCKER_API_VERSION: "1.41"

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # --- PHASE 1: Vorbereitung (DNS noch aktiv) ---

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GH_TOKEN }}

    - name: Build DNS Image
      # Hier funktioniert das Internet noch normal, 
      # Docker kann alpine:latest problemlos auflösen.
      run: make build

    # --- PHASE 2: Lokaler DNS Test (Port 53 freigeben) ---

    - name: Free Port 53 for Testing
      # Wir stoppen den Resolver erst JETZT, kurz vor 'make run'
      run: |
        sudo systemctl stop systemd-resolved
        sudo systemctl disable systemd-resolved
        sudo rm -f /etc/resolv.conf
        echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

    - name: Run DNS Service and Health Check
      run: |
        make run
        sleep 5
        make test
        make stop

    # --- PHASE 3: Deployment via Toolbox ---

    - name: Restore DNS for Push
      # Wir stellen DNS sicher, damit die Toolbox (Ansible) 
      # die Registry für den Push erreichen kann.
      if: always()
      run: |
        echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf

    - name: Build and Push to GHCR
      # Nutzt die iac-toolbox (Ansible)
      run: make push
